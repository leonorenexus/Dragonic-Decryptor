name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2.1/bin" >> $GITHUB_PATH
          gradle --version

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: ${{ github.workspace }}

      - name: List APK output
        run: find . -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecryptor-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Get Tag
        id: tag
        run: echo "tag=v1.0.0-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Dragonic Decryptor ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🐉 Dragonic Decryptor — Advanced Decryption Toolkit

            **100% Offline | Dark Neon UI | Android 7.0+**

            ### ✅ Features
            - AES-128/192/256, DES, 3DES, Blowfish, RC4, XOR decrypt
            - Base64, Hex, Binary, Octal, ROT13, JWT, URL, HTML decode
            - Smart Analyzer with Entropy Chart
            - Full History & Saved Files Manager

            ### 📲 Install
            Download the APK → enable "Install unknown apps" → install
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
