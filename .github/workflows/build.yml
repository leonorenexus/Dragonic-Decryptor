name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecryptor-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Get Tag Name
        id: tag
        run: echo "tag=v1.0.0-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Dragonic Decryptor ${{ steps.tag.outputs.tag }}"
          body: |
            ## Dragonic Decryptor - Advanced Decryption Toolkit

            ### Features
            - AES / DES / 3DES / Blowfish / RC4 / XOR decryption
            - Base64, Hex, Binary, ROT13, JWT, URL, HTML decode
            - Smart analyzer with entropy chart
            - Full offline - no internet required
            - History & saved files manager

            ### Install
            Download the APK and install on Android 7.0+
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
